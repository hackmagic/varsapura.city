name: Add Comment
on:
  repository_dispatch:
    types: [add-comment]

jobs:
  add-comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_TOKEN }}

      - name: 校验留言内容
        run: |
          COMMENT_CONTENT='${{ github.event.client_payload.content }}'
          FORBIDDEN_WORDS=("推广" "赌博" "微商" "广告" "外链" "微信")
          for word in "${FORBIDDEN_WORDS[@]}"; do
            if [[ "$COMMENT_CONTENT" == *"$word"* ]]; then
              echo "敏感词拦截：$word"
              exit 1
            fi
          done
          if [ ${#COMMENT_CONTENT} -lt 2 ] || [ ${#COMMENT_CONTENT} -gt 200 ]; then
            echo "长度不合法"
            exit 1
          fi

      - name: 更新留言数据库
        run: |
          COMMENT='${{ toJson(github.event.client_payload) }}'
          CONTENT=$(cat data/comments.json)
          NEW_CONTENT=$(echo "$CONTENT" | jq --argjson c "$COMMENT" '.list += [$c]')
          echo "$NEW_CONTENT" > data/comments.json

      - name: 提交到 GitHub
        uses: EndBug/add-and-commit@v9
        with:
          message: "匿名留言更新"
          committer_name: CommentBot
          committer_email: bot@github.com
